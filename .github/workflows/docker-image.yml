name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.kcic.co.id
  IMAGE_NAME: bridgepay-ai

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        if: github.event_name == 'push'
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_BASE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

      # PRs: build only — no push. Catches Dockerfile errors before merge.
      - name: Build (PR – verify only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # main: build and push with SHA tag + :staging
      - name: Build and push (main)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_BASE }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
